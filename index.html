<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Pingis 3D MAX</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; }

#menu {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  padding:20px;
  text-align:center;
}

#score {
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  font-size:24px;
  color:white;
  text-shadow:2px 2px black;
}

button { padding:10px 20px; margin:5px; }
</style>
</head>
<body>

<div id="menu">
  <h2>Välj spelare</h2>
  <button onclick="startGame('Alfred')">Alfred</button>
  <button onclick="startGame('Theodor')">Theodor</button>
</div>

<div id="score">0 - 0</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let player, enemy, ball;
let ballSpeed = {x:0.12, z:0.15};
let spin = 0;

let playerScore = 0;
let enemyScore = 0;

let lastPlayerX = 0;

function startGame(){
  document.getElementById("menu").style.display = "none";
  init();
  animate();
}

function init(){
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0,6,10);
  camera.lookAt(0,0,0);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff,1);
  light.position.set(5,10,5);
  scene.add(light);

  // bord
  const table = new THREE.Mesh(
    new THREE.BoxGeometry(10,0.5,6),
    new THREE.MeshPhongMaterial({color:0x0a7d2c})
  );
  scene.add(table);

  // racket (mer realistisk)
  function createRacket(color){
    const group = new THREE.Group();

    const paddle = new THREE.Mesh(
      new THREE.CylinderGeometry(0.5,0.5,0.2,32),
      new THREE.MeshPhongMaterial({color})
    );
    paddle.rotation.x = Math.PI/2;

    const handle = new THREE.Mesh(
      new THREE.CylinderGeometry(0.1,0.1,1),
      new THREE.MeshPhongMaterial({color:0x8b4513})
    );
    handle.position.y = -0.8;

    group.add(paddle);
    group.add(handle);
    return group;
  }

  player = createRacket(0x0000ff);
  player.position.set(0,0.5,2.5);
  scene.add(player);

  enemy = createRacket(0xff0000);
  enemy.position.set(0,0.5,-2.5);
  scene.add(enemy);

  ball = new THREE.Mesh(
    new THREE.SphereGeometry(0.2,32,32),
    new THREE.MeshPhongMaterial({color:0xffffff})
  );
  scene.add(ball);

  document.addEventListener("mousemove", e=>{
    let x = (e.clientX / window.innerWidth) * 10 - 5;
    lastPlayerX = player.position.x;
    player.position.x = x;
  });
}

function resetBall(direction){
  ball.position.set(0,0.5,0);
  ballSpeed.x = (Math.random() - 0.5) * 0.3;
  ballSpeed.z = direction * 0.15;
  spin = 0;
}

function updateScore(){
  document.getElementById("score").innerText = playerScore + " - " + enemyScore;

  if(playerScore >= 11 || enemyScore >= 11){
    alert("Match slut! " + (playerScore > enemyScore ? "Du vann!" : "Du förlorade!"));
    location.reload();
  }
}

function animate(){
  requestAnimationFrame(animate);

  // boll rörelse
  ballSpeed.x += spin * 0.01;
  ball.position.x += ballSpeed.x;
  ball.position.z += ballSpeed.z;

  // vägg
  if(ball.position.x > 5 || ball.position.x < -5){
    ballSpeed.x *= -1;
  }

  // PLAYER HIT (med spin)
  if(
    ball.position.z > 2 &&
    Math.abs(ball.position.x - player.position.x) < 1
  ){
    ballSpeed.z *= -1;

    // spin baserat på rörelse
    spin = (player.position.x - lastPlayerX) * 0.5;
  }

  // AI
  enemy.position.x += (ball.position.x - enemy.position.x) * 0.05;

  if(
    ball.position.z < -2 &&
    Math.abs(ball.position.x - enemy.position.x) < 1
  ){
    ballSpeed.z *= -1;
    spin = 0;
  }

  // poäng
  if(ball.position.z > 3){
    enemyScore++;
    updateScore();
    resetBall(-1);
  }

  if(ball.position.z < -3){
    playerScore++;
    updateScore();
    resetBall(1);
  }

  renderer.render(scene,camera);
}

// start boll
setTimeout(()=>resetBall(1), 500);
</script>

</body>
</html>
