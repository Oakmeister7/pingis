<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Pingis 3D FIXAD</title>
<style>
body { margin:0; overflow:hidden; }
#score {
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  font-size:24px;
  color:white;
}
</style>
</head>
<body>

<div id="score">0 - 0</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let player, enemy, ball, net;

let ballVel = {x:0.1, y:0.2, z:0.15};

let playerScore = 0;
let enemyScore = 0;

function init(){
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0,6,10);
  camera.lookAt(0,0,0);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff,1);
  light.position.set(5,10,5);
  scene.add(light);

  // bord
  const table = new THREE.Mesh(
    new THREE.BoxGeometry(10,0.5,6),
    new THREE.MeshPhongMaterial({color:0x0a7d2c})
  );
  scene.add(table);

  // nät
  net = new THREE.Mesh(
    new THREE.BoxGeometry(0.1,1,6),
    new THREE.MeshPhongMaterial({color:0xffffff})
  );
  net.position.y = 0.75;
  scene.add(net);

  // racket
  function racket(color){
    return new THREE.Mesh(
      new THREE.BoxGeometry(1,0.5,0.3),
      new THREE.MeshPhongMaterial({color})
    );
  }

  player = racket(0x0000ff);
  player.position.set(0,0.5,2.5);
  scene.add(player);

  enemy = racket(0xff0000);
  enemy.position.set(0,0.5,-2.5);
  scene.add(enemy);

  // boll
  ball = new THREE.Mesh(
    new THREE.SphereGeometry(0.2,32,32),
    new THREE.MeshPhongMaterial({color:0xffffff})
  );
  ball.position.y = 1;
  scene.add(ball);

  document.addEventListener("mousemove", e=>{
    let x = (e.clientX / window.innerWidth) * 10 - 5;
    player.position.x = x;
  });
}

function resetBall(dir){
  ball.position.set(0,1,0);
  ballVel = {
    x:(Math.random()-0.5)*0.2,
    y:0.25,
    z:dir*0.15
  };
}

function updateScore(){
  document.getElementById("score").innerText = playerScore+" - "+enemyScore;
}

function animate(){
  requestAnimationFrame(animate);

  // gravity
  ballVel.y -= 0.01;

  // rörelse
  ball.position.x += ballVel.x;
  ball.position.y += ballVel.y;
  ball.position.z += ballVel.z;

  // studsa på bord
  if(ball.position.y <= 0.5){
    ball.position.y = 0.5;
    ballVel.y *= -0.9;
  }

  // väggar
  if(ball.position.x > 5 || ball.position.x < -5){
    ballVel.x *= -1;
  }

  // nät-kollision
  if(
    Math.abs(ball.position.z) < 0.1 &&
    ball.position.y < 1.5
  ){
    ballVel.z *= -1;
  }

  // player hit
  if(
    ball.position.z > 2 &&
    Math.abs(ball.position.x - player.position.x) < 1 &&
    ball.position.y < 1.5
  ){
    ballVel.z *= -1;
    ballVel.y = 0.25;
  }

  // AI
  enemy.position.x += (ball.position.x - enemy.position.x) * 0.05;

  if(
    ball.position.z < -2 &&
    Math.abs(ball.position.x - enemy.position.x) < 1 &&
    ball.position.y < 1.5
  ){
    ballVel.z *= -1;
    ballVel.y = 0.25;
  }

  // poäng
  if(ball.position.z > 3){
    enemyScore++;
    updateScore();
    resetBall(-1);
  }

  if(ball.position.z < -3){
    playerScore++;
    updateScore();
    resetBall(1);
  }

  renderer.render(scene,camera);
}

init();
resetBall(1);
animate();
</script>

</body>
</html>
